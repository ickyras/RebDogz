<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rebellion Dogz | Open Mic Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=8" />

<style>
  .archive-page-content {
    max-width: 1100px;
    margin: 2rem auto 3rem;
    padding: 0 1rem;
  }

  .archive-title {
    text-align: center;
    margin-bottom: 1.5rem;
    color: black;
  }

  .player-panel {
    background: rgba(255, 255, 255, 0.72);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 2rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  }

  .now-playing-label {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: black;
  }

  .now-playing-title {
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 1rem;
    color: black;
  }

  .archive-embed-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    background: white;
    border: 1px solid rgba(0, 0, 0, 0.15);
  }

  .archive-embed {
    display: block;
    width: 100%;
    height: 180px;
    border: 0;
    background: white;
  }

  .archive-table-wrap {
    background: rgba(255, 255, 255, 0.72);
    border-radius: 14px;
    padding: 1rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    overflow-x: auto;
  }

  .archive-table {
    width: 100%;
    border-collapse: collapse;
  }

  .archive-table td {
    text-align: left;
    padding: 0.9rem 0.75rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.15);
    color: black;
    vertical-align: middle;
  }

  .archive-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .play-btn,
  .download-btn {
    display: inline-block;
    padding: 0.45rem 0.8rem;
    border-radius: 6px;
    border: 1px solid black;
    background: white;
    color: black;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.95rem;
  }

  .play-btn:hover,
  .download-btn:hover {
    background: #f3f3f3;
  }

  @media (max-width: 700px) {
    .archive-table td {
      padding: 0.7rem 0.5rem;
      font-size: 0.95rem;
    }

    .archive-actions {
      flex-direction: column;
      align-items: flex-start;
    }

    .archive-embed {
      height: 200px;
    }
  }
</style>
</head>

<body class="home archive-page">

<header class="site-header">
  <nav class="top-nav">
    <img src="images/aa_logo.png" alt="Rebellion Dogz Logo" class="logo" />

    <a href="index.html">Home</a>
    <a href="our_current_event.html">Our Current Event</a>
    <a href="archive.html">Speaker Archive</a>
    <a href="open_mic.html">Open Mic Archive</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="archive-page-content">
  <h1 class="archive-title">Open Mic Archive</h1>

  <section class="player-panel">
    <div class="now-playing-label">To Play Here:</div>
    <div class="now-playing-title" id="nowPlayingTitle">Select a recording below</div>

    <div class="archive-embed-wrap">
      <iframe
        id="archiveEmbed"
        class="archive-embed"
        src=""
        allow="autoplay"
        loading="lazy"
      ></iframe>
    </div>
  </section>

  <section class="archive-table-wrap">
    <table class="archive-table">
      <tbody>
        <tr>
          <td>
            <div class="archive-actions">
              <button
                class="play-btn"
                onclick="playRecording(
                  'https://archive.org/embed/05.16.26-open-mic',
                  'Open Mic - 05.16.26'
                )"
              >
                Play
              </button>
              <a
                class="download-btn"
                href="https://www.dropbox.com/scl/fi/2gyp4x3uvadfwtgz0sijq/05.16.26_open_mic.mp3?rlkey=2w1pz5w8ehzh014mjflcnc2d8&st=gx5dsrb7&dl=1"
                download
              >
                Download
              </a>
            </div>
          </td>
          <td>Open Mic</td>
          <td>Saturday, May 16th, 2026</td>
        </tr>

        <tr>
          <td>
            <div class="archive-actions">
              <button
                class="play-btn"
                onclick="playRecording(
                  'https://archive.org/embed/06.20.26-open-mic',
                  'Open Mic - 06.20.26'
                )"
              >
                Play
              </button>
              <a
                class="download-btn"
                href="https://www.dropbox.com/scl/fi/q8f0st99kfurhhjghmqze/06.20.26-Open-Mic.mp3?rlkey=cqvabuzcywso5iqhsn3mmr636&st=a81cj8jm&dl=1"
                download
              >
                Download
              </a>
            </div>
          </td>
          <td>Open Mic</td>
          <td>Saturday, June 20th, 2026</td>
        </tr>
      </tbody>
    </table>
  </section>
</main>

<script>
  function playRecording(embedUrl, titleText) {
    const archiveEmbed = document.getElementById('archiveEmbed');
    const nowPlayingTitle = document.getElementById('nowPlayingTitle');

    archiveEmbed.src = embedUrl;
    nowPlayingTitle.textContent = titleText;
  }
</script>

</body>
</html>
